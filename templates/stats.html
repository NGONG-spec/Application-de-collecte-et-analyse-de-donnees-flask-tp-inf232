<!DOCTYPE html>
<html>
<head>
    <title>Statistiques CMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container { width: 400px; display: inline-block; margin: 20px; }
    </style>
</head>
<body>
    <h1>Analyse des données collectées au CMS</h1>
    
    <div class="chart-container">
        <h3>Répartition par Sexe (Camembert)</h3>
        <canvas id="sexeChart"></canvas>
    </div>

    <div class="chart-container">
        <h3>État de santé (Histogramme)</h3>
        <canvas id="diagChart"></canvas>
    </div>

    <script>
        // Graphique Camembert
        new Chart(document.getElementById('sexeChart'), {
            type: 'pie',
            data: {
                labels: [{% for item in sexe_data %}'{{item['sexe']}}',{% endfor %}],
                datasets: [{
                    data: [{% for item in sexe_data %}{{item['count']}},{% endfor %}],
                    backgroundColor: ['#3498db', '#e74c3c']
                }]
            }
        });

        // Graphique en Bandes
        new Chart(document.getElementById('diagChart'), {
            type: 'bar',
            data: {
                labels: [{% for item in diag_data %}'{{item['diagnostic']}}',{% endfor %}],
                datasets: [{
                    label: 'Nombre d étudiants',
                    data: [{% for item in diag_data %}{{item['count']}},{% endfor %}],
                    backgroundColor: '#2ecc71'
                }]
            }
        });
    </script>
</body>
</html>
