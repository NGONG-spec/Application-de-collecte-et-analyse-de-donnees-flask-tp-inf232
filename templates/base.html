<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>

<body class="text-white min-h-screen flex flex-col">

<!-- NAVBAR RESPONSIVE -->
<nav class="p-4">

    <div class="flex justify-between items-center">
        <a href="/" class="font-bold text-lg">IMC-COLECT</a>

        <!-- bouton mobile -->
        <button id="menuBtn" class="md:hidden text-xl">
            ☰
        </button>
    </div>

    <!-- MENU -->
    <div id="menu"
         class="hidden flex flex-col mt-4 space-y-3 md:space-y-0 md:mt-0 md:flex md:flex-row md:justify-end md:items-center md:space-x-6">

        <a href="/formulaire"
           class="block w-full md:w-auto px-4 py-2 rounded-lg hover:bg-white/10 transition">
            Formulaire
        </a>

        <a href="/dashboard"
           class="block w-full md:w-auto px-4 py-2 rounded-lg hover:bg-white/10 transition">
            Dashboard
        </a>
    </div>

</nav>

<main class="flex-grow flex items-center justify-center p-4 md:p-8">
    {% block content %}{% endblock %}
</main>

<script>
document.getElementById("menuBtn").onclick = () => {
    document.getElementById("menu").classList.toggle("hidden");
}
</script>

</body>
</html>
