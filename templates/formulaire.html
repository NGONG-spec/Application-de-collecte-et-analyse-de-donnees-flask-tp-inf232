<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Collecte de Données - CMS UY1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; margin-top: 30px; }
        .section-header { background-color: #004a99; color: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container mb-5">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="text-center mb-4">Application de Collecte Médicale - CMS</h2>
                
                <form action="/enregistrer" method="POST">
                    <div class="section-header">1. Identification de l'Étudiant</div>
                    <div class="row g-3">
                        <div class="col-md-6"><label>Nom(s)</label><input type="text" name="nom" class="form-control" required></div>
                        <div class="col-md-6"><label>Prénom(s)</label><input type="text" name="prenom" class="form-control" required></div>
                        <div class="col-md-4"><label>Sexe</label><select name="sexe" class="form-select"><option value="M">Masculin</option><option value="F">Féminin</option></select></div>
                        <div class="col-md-4"><label>Date Naissance</label><input type="date" name="date_naissance" class="form-control"></div>
                        <div class="col-md-4"><label>Téléphone</label><input type="text" name="telephone" class="form-control"></div>
                    </div>

                    <div class="section-header mt-4">2. Paramètres & Diagnostic</div>
                    <div class="row g-3">
                        <div class="col-md-3"><label>Taille (m)</label><input type="number" step="0.01" id="taille" name="taille" class="form-control" required></div>
                        <div class="col-md-3"><label>Poids (kg)</label><input type="number" step="0.1" id="poids" name="poids" class="form-control" required></div>
                        <div class="col-md-3"><label>IMC (Auto)</label><input type="text" id="imc_auto" class="form-control bg-light" readonly></div>
                        <div class="col-md-3"><label>Tension (ex: 12/8)</label><input type="text" name="tension" class="form-control"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-5 py-2">Enregistrer et Générer le Diagnostic</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Calcul dynamique de l'IMC pour l'utilisateur
        const t = document.getElementById('taille');
        const p = document.getElementById('poids');
        const i = document.getElementById('imc_auto');
        [t, p].forEach(el => el.addEventListener('input', () => {
            if(t.value > 0 && p.value > 0) i.value = (p.value / (t.value * t.value)).toFixed(2);
        }));
    </script>
</body>
</html>
